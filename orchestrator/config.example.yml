version: 1

install:
  target_dir: "{{AI_ORCHESTRATOR_DIR}}"
  install_skill: true
  skill_dir: ".claude/skills"

tools:
  codex_review:
    command: "{{AI_ORCHESTRATOR_DIR}}/bin/codex-review"
    mode: consult
    default: true

  ask_gemini:
    command: "{{AI_ORCHESTRATOR_DIR}}/bin/ask-gemini"
    mode: consult
    default: true

  gemini_image:
    command: "{{AI_ORCHESTRATOR_DIR}}/bin/gemini-image"
    mode: asset_generation
    yolo_on_permission_block: true
    activation_aliases:
      - nano banana
      - nano-banana
      - gemini image model

  codex_image:
    command: "{{AI_ORCHESTRATOR_DIR}}/bin/codex-image"
    mode: asset_generation
    preferred_image_model: gpt-image-1.5

policy:
  max_external_tools_by_default: 1
  consult_is_read_only: true
  require_explicit_user_request_for_image_generation: true
  require_explicit_user_approval_for_act_mode: true
